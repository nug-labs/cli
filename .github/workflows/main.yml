name: NugLabs CLI (local copy)

# NOTE: GitHub Actions only executes workflows from .github/workflows
# at the repository root. This file is a project-local copy for
# discoverability; the active workflow lives at /.github/workflows/main.yml.

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore NugLabs.Cli.csproj

      - name: Build
        run: dotnet build NugLabs.Cli.csproj --no-restore --configuration Release

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    strategy:
      matrix:
        runtime: [win-x64, linux-x64, osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish ${{ matrix.runtime }}
        run: dotnet publish NugLabs.Cli.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishSingleFile=true -o ./publish/${{ matrix.runtime }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nug-labs-${{ matrix.runtime }}
          path: ./publish/${{ matrix.runtime }}/*

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish win-x64
        run: dotnet publish NugLabs.Cli.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/win-x64

      - name: Publish linux-x64
        run: dotnet publish NugLabs.Cli.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/linux-x64

      - name: Publish osx-x64
        run: dotnet publish NugLabs.Cli.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/osx-x64

      - name: Publish osx-arm64
        run: dotnet publish NugLabs.Cli.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o ./publish/osx-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./publish/win-x64/nuglabs.exe
            ./publish/linux-x64/nuglabs
            ./publish/osx-x64/nuglabs
            ./publish/osx-arm64/nuglabs
          generate_release_notes: true
          draft: false
          prerelease: false

